<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetDash{% if demo_mode %} [DEMO MODE]{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">NetDash M1</h1>
    {% if demo_mode %}
    <span class="badge badge--demo">[DEMO MODE]</span>
    {% endif %}
    <span id="last-updated" class="header__ts"></span>
  </header>

  <main class="main" data-demo-mode="{{ 'true' if demo_mode else 'false' }}">
    <section class="section">
      <h2 class="section__title">스위치 현황</h2>
      <div id="switch-list" class="switch-list">
        <p class="loading">데이터 로딩 중…</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
